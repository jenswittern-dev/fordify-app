<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="fordify Logo-Entwurf A – Pfeil">
  <!--
    VARIANTE A: "Vorwärts-F"
    Der Mittelbalken des F läuft in einen Pfeil aus.
    Symbolik: Forderung vorantreiben / durchsetzen.
    Differenz zu Facebook: Pfeilform macht das F unverwechselbar,
    weg von der statischen Blockform.
  -->

  <!-- Hintergrund -->
  <rect width="100" height="100" rx="18" fill="#1e3a8a"/>

  <!-- F – vertikaler Balken -->
  <rect x="22" y="20" width="12" height="60" rx="5" fill="white"/>

  <!-- F – oberer Querbalken -->
  <rect x="22" y="20" width="44" height="12" rx="4" fill="white"/>

  <!-- F – Mittelbalken als Pfeil (Balken + Spitze als einzelne Form) -->
  <path d="M22,44 H50 L70,49 L50,54 H22 Z" fill="#0891b2"/>
</svg>
