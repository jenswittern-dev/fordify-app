<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="fordify Logo-Entwurf B – Outline">
  <!--
    VARIANTE B: "Strich-F" (Outline)
    Das F wird als reine Kontur/Strichlinie gezeichnet – kein Flächen-Fill.
    Das Innere des Buchstabens bleibt transparent.
    Maximale Differenz zu Facebooks gefülltem F.
    Thema-agnostisch: funktioniert auf hellem wie dunklem Hintergrund.
    Sehr moderner, reduzierter Charakter.
  -->

  <!-- Hintergrund -->
  <rect width="100" height="100" rx="18" fill="#1e3a8a"/>

  <!-- F – vertikaler Strich + oberer Querbalken (als zusammenhängender Pfad) -->
  <path d="M67,27 L27,27 L27,74"
        fill="none"
        stroke="white"
        stroke-width="10"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- F – Mittelbalken, kürzer, als Cyan-Akzent -->
  <line x1="27" y1="50" x2="58" y2="50"
        stroke="#0891b2"
        stroke-width="10"
        stroke-linecap="round"/>
</svg>
