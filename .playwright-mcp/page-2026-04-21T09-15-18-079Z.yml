  - generic [ref=e134]:
    - generic [ref=e135]:
      - heading "Forderungsaufstellung nach § 367 BGB" [level=2] [ref=e136]
      - paragraph [ref=e137]: "§ 367 BGB schreibt die Verrechnungsreihenfolge zwingend vor: zuerst die Kosten, dann die Zinsen, zuletzt die Hauptforderung. fordify berechnet diese Verrechnung automatisch und erstellt ein druckfertiges Dokument für Anwaltskanzleien und Unternehmen."
      - heading "Anwaltskosten nach RVG 2025" [level=2] [ref=e138]
      - paragraph [ref=e139]: Der RVG-Rechner verwendet die aktuelle Tabelle aus dem BGBl. 2025 I Nr. 109 und berechnet Geschäftsgebühr (VV 2300), Verfahrensgebühr (VV 3100, VV 3309) und Auslagenpauschale (VV 7002) inklusive Umsatzsteuer auf Basis des Gegenstandswerts.
    - generic [ref=e140]:
      - heading "Verzugszinsen nach § 288 BGB berechnen" [level=2] [ref=e141]
      - paragraph [ref=e142]: Der aktuelle Basiszinssatz beträgt seit 01.01.2026 genau 1,27 %. Für B2B-Forderungen ergibt sich ein Verzugszinssatz von 10,27 % p.a., für B2C-Forderungen von 6,27 % p.a. fordify berechnet tagesgenaue Zinsen und teilt den Zeitraum automatisch an den Wechseldaten auf.
      - heading "Gerichtskosten nach GKG berechnen" [level=2] [ref=e143]
      - paragraph [ref=e144]: Gerichtsgebühren richten sich nach dem GKG. Ausgehend vom Streitwert berechnet der Gerichtskostenrechner für AG (3 Gebühren), LG (3 Gebühren), OLG (4 Gebühren) und BGH (5 Gebühren) – auf Basis der GKG Anlage 2.
