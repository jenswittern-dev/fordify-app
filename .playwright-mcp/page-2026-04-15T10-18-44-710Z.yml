                - generic [ref=e654]:
                  - heading "Ihr Fachportal zur Zwangsvollstreckung" [level=2] [ref=e656]
                  - generic [ref=e661]:
                    - paragraph [ref=e662]:
                      - text: Die Zwangsvollstreckung bezeichnet das gerichtliche Verfahren, durch das ein Gläubiger seine durch einen
                      - strong [ref=e663]: vollstreckbaren Titel
                      - text: (z. B. ein Urteil, Beschluss, Vollstreckungsbescheid) bestätigte Forderung gegen den Schuldner zwangsweise durchsetzen kann. Die
                      - strong [ref=e664]: Durchführung erfolgt durch staatliche Organe
                      - text: (z.B. Gerichtsvollzieher, Vollstreckungsgericht) und umfasst
                      - strong [ref=e665]: Maßnahmen
                      - text: wie
                      - link "Pfändung" [ref=e666] [cursor=pointer]:
