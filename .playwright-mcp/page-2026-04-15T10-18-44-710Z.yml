                  - heading "Titel – Klausel – Zustellung" [level=5] [ref=e903]
                  - heading "Voraussetzungen der Zwangsvollstreckung" [level=2] [ref=e904]
                - generic [ref=e909]:
                  - paragraph [ref=e910]: Da die Zwangsvollstreckung mit zum Teil erheblichen Eingriffen in die Grundrechte des Schuldners verbunden ist, sieht das Gesetz einerseits stark formalisierte Voraussetzungen und andererseits umfangreiche Rechtsschutzmöglichkeiten für Schuldnerinnen und Schuldner vor.
                  - paragraph [ref=e911]:
                    - strong [ref=e912]: "Der Vollstreckungstitel:"
                    - text: Vollstreckbar sind dabei zunächst rechtskräftige Urteile eines staatlichen Gerichts, die für vorläufig oder endgültig vollstreckbar erklärt wurden (§ 704 ZPO). Aber auch andere durch Gerichte oder Notar:innen erstellte Dokumente können Grundlage der Zwangsvollstreckung sein (§ 794 ZPO). Die wichtigsten davon sind gerichtliche Vollstreckungsbescheide, vor Gericht geschlossene Vergleiche oder bestimmte Notarurkunden. All diese Dokumente fasst man unter dem Begriff des „Vollstreckungstitels“ zusammen.
                  - paragraph [ref=e913]:
                    - strong [ref=e914]: Die Vollstreckungsklausel
                    - text: ": Allerdings reicht allein die Existenz des Vollstreckungstitels noch nicht aus, um die Zwangsvollstreckung zu beginnen. Diese erfordert eine sogenannte „vollstreckbare Ausfertigung“ des Titels, die mit einer „Vollstreckungsklausel“ versehen ist (§§ 724, 725 ZPO). Dies dient dazu, dass bestimmte Vollstreckungsvoraussetzungen nicht mehr von jedem später beauftragten Vollstreckungsorgan neu geprüft werden müssen, sondern zentral und einheitlich zu Beginn der Zwangsvollstreckung bestätigt werden."
                  - paragraph [ref=e915]:
                    - strong [ref=e916]: "Zustellung:"
                    - text: Schließlich muss das zu vollstreckende Dokument dem Vollstreckungsschuldner mit Beginn der Zwangsvollstreckung zugestellt werden (§ 750 ZPO). Das dient dazu, dem Schuldner die Wahrnehmung seiner Rechte zu ermöglichen und sich weitgehend vor Überraschungen zu schützen.
                  - paragraph [ref=e917]:
                    - strong [ref=e918]: "Aus diesen Vorschriften ergeben sich die Voraussetzungen, unter denen staatliche Macht zur Durchsetzung privatrechtlicher Ansprüche genutzt werden darf: Titel – Klausel – Zustellung."
