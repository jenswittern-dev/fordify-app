              - heading "Die Zwangsvollstreckungsarten" [level=2] [ref=e942]
              - generic [ref=e947]:
                - paragraph [ref=e948]: "Das Gesetz unterscheidet zwischen:"
                - list [ref=e949]:
                  - listitem [ref=e950]: der Zwangsvollstreckung wegen Geldforderungen
                  - listitem [ref=e951]: der Zwangsvollstreckung zur Erwirkung der Herausgabe von Sachen
                  - listitem [ref=e952]: der Zwangsvollstreckung zur Erwirkung von Handlungen oder Unterlassungen
                - paragraph [ref=e953]: Für den häufigsten Fall der Zwangsvollstreckung von Geldforderungen wird unterschieden zwischen
                - list [ref=e954]:
                  - listitem [ref=e955]: der Vollstreckung in bewegliche Sachen (Pfändung von Gegenständen – der berühmte „Kuckuck“, §§ 808 ff. ZPO),
                  - listitem [ref=e956]: der Vollstreckung in Forderungen (z. B. die Kontopfändung, die Pfändung von Arbeitseinkommen, §§ 828 ff. ZPO) und
                  - listitem [ref=e957]: der Zwangsvollstreckung in das unbewegliche Vermögen (Zwangsversteigerung oder Zwangsverwaltung, §§ 864 ff. ZPO, ZVG).
                - heading "Abgabe der Vermögensauskunft" [level=3] [ref=e958]
                - paragraph [ref=e959]: Keine eigene Vollstreckungsart, aber oft von sehr weitreichender Bedeutung ist die Abgabe der Vermögensauskunft (§§ 802c ff. ZPO). Im Rahmen der Vollstreckung von Geldforderungen kann der Gerichtsvollzieher vom Schuldner umfassende Auskunft über dessen Vermögen verlangen und Informationen bestimmter Behörden abfragen. Die Vollständigkeit und Richtigkeit der Vermögensauskunft ist vom Schuldner an Eides statt zu versichern (§ 802c Abs. 3 ZPO – mit der strafrechtlichen Androhung § 156 StGB).
                - paragraph [ref=e960]: Weigert sich der Schuldner, die Vermögensauskunft abzugeben, kann er bis zu sechs Monate in Haft genommen werden (§§ 802g ff. ZPO). Primär dient die Vermögensauskunft dazu, dem Gläubiger Informationen zu sinnvollen Vollstreckungsmaßnahmen zu geben. Da die Vermögensauskunft unter bestimmten Bedingungen aber in ein öffentliches Schuldnerregister eingetragen wird (§§ 882b ff. ZPO), auf das auch Auskunfteien (z. B. Schufa, Creditreform) zugreifen können, kann dies mit erheblichen Nachteilen für den Schuldner verbunden sein.
            - generic [ref=e971]:
              - generic [ref=e972]:
                - heading "Wer ist für was zuständig?" [level=5] [ref=e973]
                - heading "Ablauf der Zwangsvollstreckung" [level=2] [ref=e974]
              - generic [ref=e979]:
                - paragraph [ref=e980]:
                  - strong [ref=e981]: Die sachliche Zuständigkeit in der Zwangsvollstreckung unterscheidet sich für unterschiedliche Vollstreckungsmaßnahmen.
                - paragraph [ref=e982]:
                  - text: Insbesondere die Vollstreckung von Handlungen des Schuldners, die Vollstreckung in Forderungen und die Vollstreckung in das unbewegliche Vermögen des Schuldners fallen in die Zuständigkeit des
                  - strong [ref=e983]: Amtsgerichts
                  - text: (§ 864 ZPO), das dafür eine eigene Abteilung (Vollstreckungsgericht) unterhält. Dagegen fallen die Herausgabe von Gegenständen, die Vollstreckung in bewegliche Sachen und die Abnahme der Vermögensauskunft (sowie ggf. die Vollstreckung eines vom Gericht erlassenden Haftbefehls zur Erzwingung der Vermögensauskunft) in die Zuständigkeit des
                  - strong [ref=e984]: Gerichtsvollziehers
                  - text: (§ 753 ZPO), der gleichzeitig Beamter des mittleren Justizdienstes und Selbstständiger mit eigenen Geschäftsräumen ist.
                - paragraph [ref=e985]: Örtlich zuständig ist der Gerichtsvollzieher bzw. das Vollstreckungsgericht, an dem der Schuldner seinen Wohnsitz hat. Die Gerichtsvollzieher:innen haben innerhalb des Gerichtsbezirks eigene Zuständigkeitsbereiche. Soweit man nicht selbst den zuständigen Gerichtsvollzieher ermitteln kann, kann man den Auftrag an die Verteilerstelle für Gerichtsvollzieheraufträge des Amtsgerichts senden.
                - paragraph [ref=e986]:
                  - text: In jedem Fall beginnt die Zwangsvollstreckung nur auf Antrag des Gläubigers. Für die Standardfälle (Vollstreckung durch den Gerichtsvollzieher und Erlass eines Pfändungs- und Überweisungsbeschlusses durch das Vollstreckungsgericht) sind dafür zwingend die
                  - link "amtlichen Formulare" [ref=e987] [cursor=pointer]:
                    - /url: https://zv-assistent.de/formulare-zwangsvollstreckung/
                  - text: zu nutzen. Dazu muss – von Ausnahmen abgesehen – der originale Vollstreckungstitel mit eingereicht werden. Sind schon zuvor andere Vollstreckungsversuche unternommen worden, müssen die Nachweise über die dabei entstandenen Kosten mit eingereicht werden.
                - paragraph [ref=e988]: Gerichtsvollzieher:in bzw. Vollstreckungsgericht prüfen anhand der eingereichten Unterlagen die formalen Voraussetzungen der Zwangsvollstreckung und leiten dann die beauftragte Maßnahme ein – beispielsweise eine Sachpfändung vor Ort (beim Gerichtsvollzieherauftrag) oder den Erlass eines Pfändungs- und Überweisungsbeschlusses.
