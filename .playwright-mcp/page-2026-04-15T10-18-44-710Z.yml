                - generic [ref=e635]: Sie haben die Möglichkeit bei gesamtschuldnerischen Titeln, bei denen die Schuldner an unterschiedlichen Orten ihren Wohnsitz haben, jeweils getrennte Vollstreckungsaufträge (erforderlich wegen unterschiedlicher örtlicher Zuständigkeit des Vollstreckungsorgans) zu erzeugen. Auch können unterschiedliche Forderungsaufstellungen erzeugt werden, da womöglich unterschiedliche Forderungen gegen die jeweiligen Schuldner an den unterschiedlichen Orten vollstreckt werden sollen oder aber sich in Hinblick auf die Gebühren eine Änderung ergibt.
            - generic [ref=e644]:
