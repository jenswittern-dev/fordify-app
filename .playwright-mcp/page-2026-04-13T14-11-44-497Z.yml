    - heading "3.1 BGB-Grundlagen (§§ 398 ff.)" [level=2] [ref=e281]
    - list [ref=e282]:
      - listitem [ref=e283]:
        - strong [ref=e284]: "Formfreiheit:"
        - text: Abtretung nach § 398 BGB formlos gültig. Für die Plattform wird Textform (§ 126b BGB) empfohlen.
      - listitem [ref=e285]:
        - strong [ref=e286]: "Bestimmtheitsgrundsatz:"
        - text: Fordify-Daten (Hauptforderung, Zinsen, Kosten, Datum) erfüllen das Erfordernis.
      - listitem [ref=e287]:
        - strong [ref=e288]: "Abtretungsverbote (§ 399 BGB):"
        - emphasis [ref=e289]: pactum de non cedendo
        - text: macht Abtretung unwirksam — Offenbarungspflicht in AGB.
      - listitem [ref=e290]:
        - strong [ref=e291]: "Schuldnerbenachrichtigung (§ 409 BGB):"
        - text: Keine gesetzliche Pflicht, aber ohne Benachrichtigung kann Schuldner befreiend an Altgläubiger leisten (§ 407 BGB).
    - heading "3.2 Rechtsdienstleistungsgesetz (RDG)" [level=2] [ref=e292]
    - generic [ref=e293]:
      - generic [ref=e294]: ✅
      - generic [ref=e295]:
        - paragraph [ref=e296]: "Ergebnis: Keine RDG-Registrierung für Fordify erforderlich"
        - paragraph [ref=e297]:
          - text: Solange Fordify nur eine technische Plattform bereitstellt, keine Einschätzung zur Werthaltigkeit abgibt, keine Kaufempfehlung ausspricht und keine Vertretung der Parteien übernimmt, fällt der Betrieb nicht unter § 2 RDG.
          - emphasis [ref=e298]: Käufer
          - text: ", die als Inkassounternehmen agieren, benötigen jedoch eine Registrierung nach § 10 RDG."
