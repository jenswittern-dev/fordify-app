    - generic [ref=e826]: Kapitel 9
    - heading "DSGVO und Datenschutz" [level=1] [ref=e827]
    - generic [ref=e829]:
      - generic [ref=e830]: 🔴
      - generic [ref=e831]:
        - paragraph [ref=e832]: "Statusänderung: Fordify wird Verantwortlicher"
        - paragraph [ref=e833]: Aktuell verlassen keine Daten den Browser — Fordify ist kein DSGVO-Verantwortlicher. Mit dem Account-Modell und Supabase-Speicherung wird Fordify zum Verantwortlichen nach Art. 4 Nr. 7 DSGVO. Das ist eine fundamentale Statusänderung mit konkreten Pflichten.
    - heading "9.1 Schuldnerdaten — Fordify als Auftragsverarbeiter" [level=2] [ref=e834]
    - paragraph [ref=e835]:
      - text: Schuldner-Namen und -Adressen in Falldaten sind personenbezogene Daten. Der Schuldner ist kein Vertragspartner von Fordify.
      - strong [ref=e836]: "Empfohlene Konstruktion:"
    - generic [ref=e837]: Schuldner ← betroffen von → Anwalt (Verantwortlicher) ↓ erteilt Weisungen Fordify (Auftragsverarbeiter) ↓ nutzt Supabase (Sub-Auftragsverarbeiter)
    - paragraph [ref=e838]:
      - text: "Konsequenz: Fordify muss einen"
      - strong [ref=e839]: AVV mit jeder Kanzlei
      - text: abschließen (Art. 28 DSGVO). Schuldnerdaten dürfen ausschließlich weisungsgebunden verwendet werden — kein KI-Training, keine Weitergabe.
    - 'heading "9.2 Kritischste TOM: Row-Level Security" [level=2] [ref=e840]'
    - generic [ref=e841]: "-- Jeder Nutzer sieht ausschließlich eigene Daten CREATE POLICY \"own_data\" ON cases FOR ALL USING (auth.uid() = user_id); CREATE POLICY \"own_data\" ON settings FOR ALL USING (auth.uid() = user_id);"
    - generic [ref=e842]:
      - generic [ref=e843]: ⚠️
      - generic [ref=e844]:
        - paragraph [ref=e845]: RLS muss vor Launch mit zwei Test-Accounts getestet sein
        - paragraph [ref=e846]: Ohne korrekte RLS-Konfiguration könnten Nutzer Daten anderer Nutzer sehen — das wäre eine DSGVO-Datenpanne mit Meldepflicht (Art. 33 DSGVO, 72-Stunden-Frist).
