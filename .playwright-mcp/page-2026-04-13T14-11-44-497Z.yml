      - generic [ref=e135]: 1 · Executive Summary
    - generic [ref=e136]: Kapitel 1
    - heading "Executive Summary" [level=1] [ref=e137]
    - generic [ref=e139]:
      - generic [ref=e140]: Die Kernstrategie in einem Satz
      - paragraph [ref=e141]:
        - text: "Fordify wächst in drei Stufen:"
        - strong [ref=e142]: Werkzeug
        - text: (beste Forderungsaufstellung im Browser) →
        - strong [ref=e143]: Produkt
        - text: (Freemium-SaaS für Kanzleien) →
        - strong [ref=e144]: Plattform
        - text: (Marktplatz für Forderungsabtretungen) — wobei jede Stufe wirtschaftlich eigenständig tragfähig sein muss.
    - generic [ref=e145]:
      - generic [ref=e146]:
        - generic [ref=e147]: 60 Mrd.
        - generic [ref=e148]: NPL-Markt 2026
        - generic [ref=e149]: Deutschland, wachsend
      - generic [ref=e150]:
        - generic [ref=e151]: ~2–3 Wo.
        - generic [ref=e152]: Architektur-Umbau
        - generic [ref=e153]: Free/Paid MVP
      - generic [ref=e154]:
        - generic [ref=e155]: 29 €/Mo.
        - generic [ref=e156]: Solo-Tier Preis
        - generic [ref=e157]: 249 €/Jahr · Paddle MoR
    - heading "Die zehn wichtigsten Erkenntnisse" [level=2] [ref=e158]
    - list [ref=e159]:
      - listitem [ref=e160]:
        - strong [ref=e161]: Markt groß, Lücke real.
        - text: Der deutsche NPL-Markt wächst auf 60 Mrd. EUR (2026). Das Kleinforderungssegment (< 25.000 EUR) ist von keiner bestehenden Plattform adressiert.
      - listitem [ref=e162]:
        - strong [ref=e163]: "Richtiges Free Tier:"
        - text: „Kein Speichern + kein Export" — nicht ein Limit auf N Fälle. Erzeugt Upgrade-Druck genau im Moment des höchsten Nutzens.
      - listitem [ref=e164]:
        - strong [ref=e165]: Paddle statt Stripe
        - text: — als Merchant of Record übernimmt Paddle alle USt-Compliance-Pflichten. Spart 10–20 Stunden/Monat Steueradministration.
      - listitem [ref=e166]:
        - strong [ref=e167]: Architektur-Umbau in 2–3 Wochen
        - text: via Storage-Abstraktionsschicht. Nur ~4 Funktionen brauchen Feature-Gates.
      - listitem [ref=e168]:
        - strong [ref=e169]: Marktplatz rechtlich machbar, aber komplex.
        - text: Direkter Launch ohne Rechtsberatung wäre fahrlässig.
      - listitem [ref=e170]:
        - strong [ref=e171]: Fordify wird DSGVO-Verantwortlicher
        - text: mit Account-Modell. Supabase RLS muss vor Launch korrekt konfiguriert sein; AVV mit Kanzleien ist Pflicht.
      - listitem [ref=e172]:
        - strong [ref=e173]: Marktplatz startet als Schwarzes Brett
        - text: (Modell A) — kein Matching, keine Zahlungsabwicklung, minimales regulatorisches Risiko.
      - listitem [ref=e174]:
        - strong [ref=e175]: "Preise:"
        - text: Solo 29 €/Monat (249 €/Jahr), Kanzlei 79 €/Monat (669 €/Jahr).
      - listitem [ref=e176]:
        - strong [ref=e177]: 5.000 € MRR-Ziel
        - text: bei 4 % Conversion erreichbar mit ~3.500 Free-Nutzern — realistische 18-Monats-Perspektive.
      - listitem [ref=e178]:
        - strong [ref=e179]: "Alleinstellungsmerkmal:"
        - text: Kein Anbieter verbindet § 367 BGB-konforme Berechnung und Forderungsverkauf in einem Workflow.
    - generic [ref=e180]:
