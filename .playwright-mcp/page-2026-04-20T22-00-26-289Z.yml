  - generic [ref=e131]:
    - heading "Forderungsaufstellung nach § 367 BGB" [level=2] [ref=e132]
    - paragraph [ref=e133]: "Eine rechtssichere Forderungsaufstellung zeigt, wie Zahlungseingänge auf eine offene Forderung verrechnet werden. § 367 BGB schreibt die Reihenfolge zwingend vor: zuerst die Kosten, dann die Zinsen, zuletzt die Hauptforderung. fordify berechnet diese Verrechnung automatisch und erstellt ein druckfertiges, professionelles Dokument für Anwaltskanzleien und Unternehmen."
    - heading "Verzugszinsen nach § 288 BGB berechnen" [level=2] [ref=e134]
    - paragraph [ref=e135]: "Gerät ein Schuldner in Verzug, entstehen automatisch Verzugszinsen. Der gesetzliche Zinssatz beträgt bei Forderungen zwischen Unternehmen (B2B) Basiszinssatz + 9 Prozentpunkte, bei Verbraucher-Forderungen (B2C) Basiszinssatz + 5 Prozentpunkte. Der Basiszinssatz wird von der Deutschen Bundesbank halbjährlich zum 1. Januar und 1. Juli festgesetzt. Der Verzugszinsrechner von fordify verwendet stets den aktuellen Basiszinssatz und berechnet tagesgenaue Zinsen für jeden Abrechnungszeitraum. Der aktuelle Basiszinssatz beträgt seit dem 01.01.2026 genau 1,27 % (vorher ab 01.07.2025: 2,27 %). Für B2B-Forderungen ergibt sich damit ein Verzugszinssatz von 10,27 % p.a., für B2C-Forderungen von 6,27 % p.a."
    - heading "Anwaltskosten nach RVG berechnen" [level=2] [ref=e136]
    - paragraph [ref=e137]: Anwaltsgebühren richten sich nach dem Rechtsanwaltsvergütungsgesetz (RVG). Grundlage ist der Gegenstandswert (Streitwert), aus dem die einfache Gebühr nach der RVG-Gebührentabelle (Anlage 2 zu § 13 RVG) ermittelt wird. Der RVG-Rechner von fordify verwendet die aktuelle Tabelle aus dem BGBl. 2025 I Nr. 109 und berechnet Geschäftsgebühr (VV 2300), Verfahrensgebühr (VV 3100, VV 3309) und Auslagenpauschale (VV 7002) inklusive Umsatzsteuer.
    - heading "Gerichtskosten nach GKG berechnen" [level=2] [ref=e138]
    - paragraph [ref=e139]: Die Gerichtsgebühren in Zivilsachen richten sich nach dem Gerichtskostengesetz (GKG). Ausgehend vom Streitwert und der Instanz – Amtsgericht (3 Gebühren), Landgericht (3 Gebühren), Oberlandesgericht (4 Gebühren), Bundesgerichtshof (5 Gebühren) – berechnet der Gerichtskostenrechner die anfallenden Gerichtsgebühren auf Basis der GKG Anlage 2.
    - heading "fordify – Das Tool für Anwaltskanzleien" [level=2] [ref=e140]
    - paragraph [ref=e141]: "fordify kombiniert alle Berechnungen in einem einzigen, professionellen Workflow. Das Tool wurde gemeinsam mit einem zugelassenen Rechtsanwalt entwickelt und inhaltlich geprüft. Die RVG-Tabelle entspricht dem Bundesgesetzblatt 2025 I Nr. 109. Die Basiszinssätze sind bis zum 01.07.2026 aktuell gepflegt. Die Anwendung läuft vollständig im Browser: keine Installation, keine Registrierung, keine Datenweitergabe. Alle eingegebenen Daten bleiben ausschließlich auf dem Gerät des Nutzers – fordify ist DSGVO-konform konzipiert. Das Tool richtet sich an Anwaltskanzleien, Syndikusanwälte, Inkassounternehmen, Finanzabteilungen und alle Unternehmen mit aktivem Forderungsmanagement."
