<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" role="img" aria-label="fordify">
  <!-- Icon mark (44x44) -->
  <rect width="44" height="44" rx="8" fill="#1e3a8a"/>
  <!-- F vertical stroke -->
  <rect x="10" y="9" width="5.5" height="26" rx="2.75" fill="white"/>
  <!-- F top bar -->
  <rect x="10" y="9" width="20" height="5.5" rx="2" fill="white"/>
  <!-- F middle bar (accent) -->
  <rect x="10" y="19.5" width="14" height="4.5" rx="2" fill="#0891b2"/>

  <!-- Wordmark: "fordify" -->
  <text x="56" y="30"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22"
        font-weight="600"
        letter-spacing="-0.5"
        fill="#1e3a8a">fordify</text>
</svg>
